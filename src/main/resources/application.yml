server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    compatibility-verifier:
      enabled: false

    gateway:
      routes:
        - id: ms-usuario
          uri: lb://ms-usuario
          predicates:
            - Path=/api/usuarios/**

        - id: ms-producto
          uri: lb://ms-producto
          predicates:
            - Path=/api/productos/**

        - id: ms-bodega
          uri: lb://ms-bodega
          predicates:
            - Path=/api/bodegas/**

        - id: ms-pagos
          uri: lb://ms-pagos
          predicates:
            - Path=/pagos/**

        - id: ms-ventas
          uri: lb://ms-ventas
          predicates:
            - Path=/api/ventas/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

  instance:
    instance-id: ${spring.application.name}:${spring.cloud.client.ip-address}:${server.port}
    prefer-ip-address: true